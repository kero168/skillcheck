name: Release

# Publishes to npm when a v* tag is pushed.
#
# Uses npm Trusted Publishing (OIDC): configure this repository + workflow as
# a trusted publisher for the "skillcheck" package on npmjs.com. No NPM_TOKEN
# secret is stored; the id-token permission below lets npm mint short-lived
# credentials and attach provenance.

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm test
      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "package.json ($PKG_VERSION) does not match tag ($TAG_VERSION)" && exit 1
          fi
      - run: npm publish --provenance --access public
