name: Feature request
description: Propose a new rule, flag, or behavior
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do today, or what goes wrong silently?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: >-
        For new lint rules: what should it check, error or warning, and can
        you give one example that should fire and one that should not?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
