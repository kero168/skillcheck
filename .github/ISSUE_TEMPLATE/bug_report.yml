name: Bug report
description: Something is broken or behaves unexpectedly
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: skillcheck version
      description: Output of `skillcheck --version`
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version and OS
      placeholder: "node 22.11.0 / macOS 15"
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: >-
        The command you ran and, if possible, the SKILL.md (or a minimized
        version) that triggers the problem.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual behavior
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Anything else
      description: "--json output, stack traces, related issues."
